name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - erlang: "27.3"
            elixir: "1.19.5"
            lint: true
            big: true
          - erlang: "27.3"
            elixir: "1.18.4"
          - erlang: "27.3"
            elixir: "1.17.3"
          - erlang: "26.2"
            elixir: "1.16.3"
          - erlang: "26.2"
            elixir: "1.15.8"
          - erlang: "25.3"
            elixir: "1.14.5"
          - erlang: "25.3"
            elixir: "1.13.4"
          - erlang: "24.3.4"
            elixir: "1.12.3"
    steps:
      - uses: actions/checkout@v4

      - name: Install OTP and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{matrix.erlang}}
          elixir-version: ${{matrix.elixir}}

      - name: Install dependencies
        run: mix deps.get

      - name: Check for unused dependencies
        run: mix deps.unlock --check-unused
        if: ${{matrix.lint}}

      - name: Compile with --warnings-as-errors
        run: mix compile --warnings-as-errors
        if: ${{matrix.lint}}

      - name: Check mix format
        run: mix format --check-formatted
        if: ${{matrix.lint}}

      - name: Run tests
        run: mix test
        if: ${{!matrix.big}}

      - name: Run tests
        run: mix test
        if: ${{matrix.big}}
        env:
          MAX_RUNS: "50000"
